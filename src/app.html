<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="PeriMenoBomb" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/icons/apple-touch-icon.png" />
    <!-- Static manifest link so the app is installable from the SPA shell.
         %sveltekit.assets% resolves base-correctly in both index.html and the
         404.html deep-link fallback. Filename matches vite-plugin-pwa's default. -->
    <link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
    <title>PeriMenoBomb</title>
    <style>
      html, body { background: #ffffff; }
      #app-splash {
        position: fixed; inset: 0; z-index: 9999; overflow: hidden;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: clamp(8px, 2vmin, 24px);
        background: #ffffff;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        color: #1f2937;
      }
      #app-splash img {
        width: min(82vmin, 820px);
        height: min(82vmin, 820px);
        object-fit: contain;
      }
      #app-splash .title {
        font-size: clamp(1.75rem, 6vmin, 3rem);
        font-weight: 800;
        letter-spacing: -0.01em;
        margin: 0;
        line-height: 1;
      }
      #app-splash .tagline {
        font-size: clamp(0.95rem, 2.4vmin, 1.15rem);
        color: #6b7280;
        margin: 0;
        line-height: 1.2;
      }
      /* No animation: the splash simply covers the hydration window and is
         removed the instant the app is mounted (body.app-ready). */
      body.app-ready #app-splash {
        display: none;
      }
    </style>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div id="app-splash" aria-hidden="true">
      <img src="%sveltekit.assets%/brand.webp" alt="" />
      <p class="title">PeriMenoBomb</p>
      <p class="tagline">The Symptom Tracker</p>
    </div>
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
