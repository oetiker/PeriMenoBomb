allowBuilds:
  core-js: false

# Security overrides for transitive deps flagged by Dependabot. None are
# exploitable in this static, offline PWA (undici is test-only via jsdom;
# cookie is build-only via SvelteKit/adapter-static; dompurify ships via jspdf
# but is never invoked) — these bumps are hygiene to clear the alerts.
overrides:
  undici: ^7.28.0
  dompurify: ^3.4.11
  cookie: ^0.7.0
